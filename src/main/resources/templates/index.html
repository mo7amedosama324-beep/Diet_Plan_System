<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Plan System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
        }
        .checkbox-item input {
            width: auto;
            margin-right: 8px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        #result {
            margin-top: 30px;
            display: none;
        }
        .result-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .result-section h2 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        .meals-list, .exercises-list {
            list-style: none;
            padding: 0;
        }
        .meals-list li, .exercises-list li {
            padding: 10px;
            background: white;
            margin: 5px 0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Diet Plan System 💪</h1>
        
        <form id="dietForm">
            <div class="form-group">
                <label>Age (العمر):</label>
                <input type="number" id="age" required min="10" max="100">
            </div>
            
            <div class="form-group">
                <label>Height (الطول - cm):</label>
                <input type="number" id="height" required min="100" max="250">
            </div>
            
            <div class="form-group">
                <label>Weight (الوزن - kg):</label>
                <input type="number" id="weight" required min="30" max="200">
            </div>
            
            <div class="form-group">
                <label>Gender (الجنس):</label>
                <select id="gender" required>
                    <option value="">Select...</option>
                    <option value="male">Male (ذكر)</option>
                    <option value="female">Female (أنثى)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Activity Level (مستوى النشاط):</label>
                <select id="activityLevel" required>
                    <option value="">Select...</option>
                    <option value="1">1 - Sedentary (قاعد)</option>
                    <option value="2">2 - Light Activity (نشاط خفيف)</option>
                    <option value="3">3 - Moderate Activity (نشاط متوسط)</option>
                    <option value="4">4 - Very Active (نشاط عالي)</option>
                    <option value="5">5 - Extremely Active (نشاط عالي جداً)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Health Issues (المشاكل الصحية):</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="knee" value="knee">
                        <label for="knee">Knee (ركبة)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="back" value="back">
                        <label for="back">Back (ظهر)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="shoulder" value="shoulder">
                        <label for="shoulder">Shoulder (كتف)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="arm" value="arm">
                        <label for="arm">Arm (ذراع)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="core" value="core">
                        <label for="core">Core (بطن)</label>
                    </div>
                </div>
            </div>
            
            <button type="submit">Calculate Plan (احسب)</button>
        </form>
        
        <div id="result">
            <div class="result-section">
                <h2>📊 Body Analysis</h2>
                <div class="stat"><span>BMI:</span><span id="bmi"></span></div>
                <div class="stat"><span>Status:</span><span id="status"></span></div>
                <div class="stat"><span>Goal:</span><span id="goal"></span></div>
                <div class="stat"><span>BMR:</span><span id="bmr"></span></div>
                <div class="stat"><span>TDEE:</span><span id="tdee"></span></div>
            </div>
            
            <div class="result-section">
                <h2>🍽️ Diet Plan</h2>
                <div class="stat"><span>Target Calories:</span><span id="calories"></span></div>
                <div class="stat"><span>Protein:</span><span id="protein"></span></div>
                <div class="stat"><span>Carbs:</span><span id="carbs"></span></div>
                <div class="stat"><span>Fats:</span><span id="fats"></span></div>
                <h3 style="margin-top: 15px; margin-bottom: 10px;">Meals:</h3>
                <ul class="meals-list" id="meals"></ul>
            </div>
            
            <div class="result-section">
                <h2>💪 Exercise Plan</h2>
                <ul class="exercises-list" id="exercises"></ul>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('dietForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const healthIssues = [];
            ['knee', 'back', 'shoulder', 'arm', 'core'].forEach(issue => {
                if (document.getElementById(issue).checked) {
                    healthIssues.push(issue);
                }
            });
            
            const data = {
                age: parseInt(document.getElementById('age').value),
                height: parseFloat(document.getElementById('height').value),
                weight: parseFloat(document.getElementById('weight').value),
                gender: document.getElementById('gender').value,
                activityLevel: parseInt(document.getElementById('activityLevel').value),
                healthIssues: healthIssues
            };
            
            try {
                const response = await fetch('/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                document.getElementById('bmi').textContent = result.bmi.toFixed(1);
                document.getElementById('status').textContent = result.bodyStatus;
                document.getElementById('goal').textContent = result.goal;
                document.getElementById('bmr').textContent = result.bmr + ' cal/day';
                document.getElementById('tdee').textContent = result.tdee + ' cal/day';
                document.getElementById('calories').textContent = result.targetCalories + ' cal/day';
                document.getElementById('protein').textContent = result.protein + 'g';
                document.getElementById('carbs').textContent = result.carbs + 'g';
                document.getElementById('fats').textContent = result.fats + 'g';
                
                const mealsList = document.getElementById('meals');
                mealsList.innerHTML = '';
                result.meals.forEach(meal => {
                    const li = document.createElement('li');
                    li.textContent = meal;
                    mealsList.appendChild(li);
                });
                
                const exercisesList = document.getElementById('exercises');
                exercisesList.innerHTML = '';
                result.exercises.forEach(exercise => {
                    const li = document.createElement('li');
                    li.textContent = '✓ ' + exercise;
                    exercisesList.appendChild(li);
                });
                
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
